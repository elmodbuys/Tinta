<!Doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tinta</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    </head>

    <body>
        <header>
            <h1>Tinta</h1>
            <p>
                Discover your Palette.
            </p>
        </header>
        <main>
            <div class="swatch">
                <div class="swatch-colour"></div>
                <div class="swatch-info">
                    <p class="swatch-name">Dusty Rose</p>
                    <p class="swatch-hex">#C4A0A0</p>
                </div>
            </div>

            <div class="swatch">
                <div class="swatch-colour"></div>
                <div class="swatch-info">
                    <p class="swatch-name">Slate Blue</p>
                    <p class="swatch-hex">#6A5ACD</p>
                </div>
            </div>

            <div class="swatch">
                <div class="swatch-colour"></div>
                <div class="swatch-info">
                    <p class="swatch-name">Ice White</p>
                    <p class="swatch-hex">#EDF4F5</p>
                </div>
            </div>

            <div class="swatch">
                <div class="swatch-colour"></div>
                <div class="swatch-info">
                    <p class="swatch-name">Auburn Red</p>
                    <p class="swatch-hex">#A52A2A</p>
                </div>
            </div>

            <div class="swatch">
                <div class="swatch-colour"></div>
                <div class="swatch-info">
                    <p class="swatch-name">Midnight Green</p>
                    <p class="swatch-hex">#004953</p>
                </div>
            </div>
        </main>
        
        <div class="button-container">
            <button onclick="generatePalette()">Generate</button>
        </div>    

        <script src="script.js"></script>
    </body>
</html>
